[experiment]
name = "信贷审批专家经验萃取示例"

[agent]
mode = "manual"
project_root = "../deepagents_gepa_credit_approval_project"
system_prompt = "你是企业项目风险点分析助手。收到企业名称后，先使用 credit-risk-review 技能并调用现有工具取得企业专属信息。只输出已有事实能够支持的风险点及其影响；缺少信息的维度不推测、不用通用模板补齐；不输出审批意见、授信结论或放款条件。"
memory = ["AGENTS.md"]
skills = ["skills"]
tools = ["./tools.py:lookup_policy", "./tools.py:lookup_financial_snapshot", "./tools.py:record_review_note"]

[surfaces.memory]
kind = "file"
path = "AGENTS.md"
component = "memory:AGENTS.md"
source_type = "memory"

[surfaces.skills]
kind = "skill_dir"
path = "skills"

[dataset]
source = "golden_jsonl"
path = "evals/expert_rubrics.jsonl"
split_strategy = "stratified"
train_ratio = 0.60
val_ratio = 0.20
test_ratio = 0.20
stratify_by = ["metadata.difficulty"]
seed = 17
evaluate_final_test = true
