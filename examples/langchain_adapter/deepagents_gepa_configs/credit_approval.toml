[experiment]
name = "信贷审批专家经验萃取示例"

[agent]
mode = "manual"
project_root = "../deepagents_gepa_credit_approval_project"
system_prompt = "你是企业项目风险点分析助手。收到企业名称后，先使用 credit-risk-review 技能并调用现有工具取得企业专属信息。只输出已有事实能够支持的风险点及其影响；缺少信息的维度不推测、不用通用模板补齐；不输出审批意见、授信结论或放款条件。"
memory = ["AGENTS.md"]
skills = ["skills"]
tools = ["./tools.py:lookup_policy", "./tools.py:lookup_financial_snapshot", "./tools.py:record_review_note"]

[surfaces.memory]
kind = "file"
path = "AGENTS.md"
component = "memory:AGENTS.md"
source_type = "memory"

[surfaces.skills]
kind = "skill_dir"
path = "skills"

[dataset]
source = "golden_jsonl"
path = "evals/expert_rubrics.jsonl"
rubric = """
将 data 视为审批官风险评价意见中的“项目风险点”章节。评价智能体根据企业名称自主检索、分析后形成的轨迹与最终输出：
1. 是否通过成功且有可用结果的工具调用取得与企业特征相关的证据；
2. 是否覆盖 data 中的核心风险点，未覆盖的 checkpoint 仍降低任务分数；
3. 是否说明企业事实、必要比较和风险传导，缺少信息时不编造；
4. 根据轨迹区分无对应工具、跳过可用工具、调用失败、结果不足和已有证据但分析遗漏；
5. 最终输出只评价有事实支持的风险点及影响，不要求或奖励审批意见、授信结论、额度、放款条件、贷后方案或大段待补资料清单；
6. 不奖励套模板、未查证、把单一样本写成通用规则或把工具能力缺口伪装成文本知识。
"""
split_strategy = "stratified"
train_ratio = 0.60
val_ratio = 0.20
test_ratio = 0.20
stratify_by = ["metadata.difficulty"]
seed = 17
evaluate_final_test = true
